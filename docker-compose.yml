version: '3.9'

services:
  bot:
    build: .
    container_name: linear-slack-status-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - bot_data:/app/data
      - bot_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  bot_data:
  bot_logs: